  <title>Simple Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .chatbox { width: 300px; height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; margin: auto; margin-top: 50px; }
    .user, .bot { margin: 5px 0; }
    .user { text-align: right; color: blue; }
    .bot { text-align: left; color: green; }
    input[type="text"] { width: 80%; padding: 5px; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>

<div class="chatbox" id="chatbox"></div>

<div style="text-align:center; margin-top:10px;">
  <input type="text" id="userInput" placeholder="Type your message" />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if (!msg) return;

    const chatbox = document.getElementById("chatbox");
    chatbox.innerHTML += `<div class="user">You: ${msg}</div>`;

    let response = getBotResponse(msg.toLowerCase());
    chatbox.innerHTML += `<div class="bot">Bot: ${response}</div>`;

    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function getBotResponse(input) {
    if (input.includes("hello")) return "Hi there!";
    if (input.includes("weather updates")) return "Pleasant weather!";
    if (input.includes("give distance from isbt to buddha temple")) return "not too much just 3 km!";
    if (input.includes("places")) return "Tapkeshwar,Buddha Temple,George Everest!";
    if (input.includes("how are you")) return "I'm Doing fine, what about you!";
    if (input.includes("Give me some place to visit in dehradun"))    return "Tapkeshwar,Buddha Temple,George Everest!";  
    return "Sorry, I didn't understand that.";
  }
  
</script>

</body>
